name: Periodic JSON Update

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

# 権限不足エラーを解消するための設定を追加
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download and Validate JSONs
        run: |
          # 1つ目のJSON (KYOTOGRAPHIE)
          curl -f -s "https://www.kyotographie.jp/api/exhibition/" -o app_kg_temp.json
          if jq -e . >/dev/null 2>&1 < app_kg_temp.json; then
            mv app_kg_temp.json app_kg.json
          else
            echo "Error: app_kg.json is invalid"
            exit 1
          fi

          # 2つ目のJSON (KG+)
          curl -f -s "https://kgplus.kyotographie.jp/api/exhibition/" -o app_plus_temp.json
          if jq -e . >/dev/null 2>&1 < app_plus_temp.json; then
            mv app_plus_temp.json app_plus.json
          else
            echo "Error: app_plus.json is invalid"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          keep_files: false
          # ここを修正: force_modify ではなく force_orphan に変更
          force_orphan: true
