name: Periodic JSON Update

on:
  schedule:
    # 5分おきに設定（これでも認識されない場合は、一度 '0 * * * *' などに変えてPushするのも手です）
    - cron: '*/5 * * * *'
  workflow_dispatch: # 手動ボタンも残す

# 権限不足エラーを解消するための設定を追加
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download and Validate JSONs
        run: |
          # 共通のcurlオプション（ブラウザのふりをする）
          CURL_OPT="-f -sL -A 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'"

          # 1つ目のJSON (KYOTOGRAPHIE)
          echo "Downloading app_kg.json..."
          eval curl $CURL_OPT "https://www.kyotographie.jp/api/for_app/" -o app_kg_temp.json
          
          # バリデーション：JSON形式であり、かつ 'news' キーが含まれているか確認
          if jq -e '.news' >/dev/null 2>&1 < app_kg_temp.json; then
            mv app_kg_temp.json app_kg.json
            echo "app_kg.json updated with full data."
          else
            echo "Error: app_kg.json is incomplete or invalid. Skipping update."
            exit 1
          fi

          # 2つ目のJSON (KG+)
          echo "Downloading app_plus.json..."
          eval curl $CURL_OPT "https://kgplus.kyotographie.jp/api/for_app/" -o app_plus_temp.json
          
          # 同様のバリデーション
          if jq -e . >/dev/null 2>&1 < app_plus_temp.json; then
            mv app_plus_temp.json app_plus.json
            echo "app_plus.json updated successfully."
          else
            echo "Error: app_plus.json is invalid. Skipping update."
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          keep_files: false
          # ここを修正: force_modify ではなく force_orphan に変更
          force_orphan: true
